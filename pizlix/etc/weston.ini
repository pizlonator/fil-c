[core]
backend=drm-backend.so
# Use software rendering since you're in VM
renderer=pixman

[shell]
# Basic desktop shell
background-image=/usr/share/weston/project2030.jpg
background-type=scale-crop
panel-position=top

[keyboard]
keymap_layout=us

[output]
# Let it auto-detect your display
# You can add specific config if needed:
name=Virtual-1
mode=1024x768
